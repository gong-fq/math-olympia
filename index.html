<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>小学奥数通 - Primary Math Olympia</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-blue-600 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Primary Math Olympia</h1>
            <select id="gradeSelect" class="bg-blue-700 p-2 rounded outline-none border-none text-white">
                <option value="G1">一年级</option>
                <option value="G2">二年级</option>
                <option value="G3">三年级</option>
                <option value="G4">四年级</option>
                <option value="G5">五年级</option>
                <option value="G6">六年级</option>
            </select>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        <div class="flex flex-wrap gap-3 justify-center mb-10">
            <button onclick="loadTopic('Arithmetic')" class="px-6 py-3 bg-white shadow rounded hover:bg-blue-50">计算技巧</button>
            <button onclick="loadTopic('Logic')" class="px-6 py-3 bg-white shadow rounded hover:bg-blue-50">逻辑推理</button>
            <button onclick="loadTopic('Geometry')" class="px-6 py-3 bg-white shadow rounded hover:bg-blue-50">几何图形</button>
            <button onclick="loadTopic('NumberTheory')" class="px-6 py-3 bg-white shadow rounded hover:bg-blue-50">数论基础</button>
            <button onclick="loadTopic('WordProblems')" class="px-6 py-3 bg-white shadow rounded hover:bg-blue-50">应用题</button>
            <button onclick="loadTopic('Combinatorics')" class="px-6 py-3 bg-white shadow rounded hover:bg-blue-50">组合数学</button>
        </div>

        <div id="content" class="max-w-3xl mx-auto space-y-4">
            <p class="text-center text-gray-400">选择一个专题开始探索...</p>
        </div>
    </main>

    <script>
        async function loadTopic(cat) {
            const grade = document.getElementById('gradeSelect').value;
            const content = document.getElementById('content');
            content.innerHTML = '<p class="text-center">正在加载题目...</p>';
            
            try {
                // 注意：这里使用相对路径 /api/，Netlify 会根据 toml 映射到 function
                const resp = await fetch(`/api/get-questions?grade=${grade}&category=${cat}`);
                const data = await resp.json();
                
                if (!data.length) {
                    content.innerHTML = '<p class="text-center text-orange-500">该专题暂无练习题。</p>';
                    return;
                }

                content.innerHTML = data.map((item, i) => `
                    <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-500">
                        <div class="text-lg mb-4 font-medium">${i+1}. ${item.q}</div>
                        <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="text-blue-600 text-sm font-bold">查看答案</button>
                        <div class="hidden mt-4 p-4 bg-gray-50 rounded border border-dashed border-gray-300">
                            <p class="text-green-700 font-bold">结果: ${item.a}</p>
                            <p class="text-gray-600 mt-1 text-sm">解析: ${item.exp}</p>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                content.innerHTML = '<p class="text-center text-red-500 font-bold">数据加载失败。请确保 Netlify Functions 已成功部署。</p>';
            }
        }
    </script>
</body>
</html>
