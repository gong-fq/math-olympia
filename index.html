<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小学奥数通 - Primary Math Olympia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
    <style>
        .math-card { transition: all 0.3s ease; }
        .math-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">
    <nav class="bg-indigo-700 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-extrabold tracking-tight">Primary Math Olympia</h1>
            <div class="flex items-center gap-3">
                <span class="text-sm opacity-80">当前级别:</span>
                <select id="gradeSelect" class="bg-indigo-800 border-none rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-300 outline-none">
                    <option value="G1">一年级 (Grade 1)</option>
                    <option value="G2">二年级 (Grade 2)</option>
                    <option value="G3">三年级 (Grade 3)</option>
                    <option value="G4">四年级 (Grade 4)</option>
                    <option value="G5">五年级 (Grade 5)</option>
                    <option value="G6">六年级 (Grade 6)</option>
                </select>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="flex flex-wrap gap-2 justify-center mb-10">
            <button onclick="loadTopic('Arithmetic')" class="px-5 py-2.5 bg-white rounded-full shadow-sm hover:shadow-md hover:bg-indigo-50 text-indigo-700 font-semibold border border-indigo-100 transition">计算技巧</button>
            <button onclick="loadTopic('Logic')" class="px-5 py-2.5 bg-white rounded-full shadow-sm hover:shadow-md hover:bg-indigo-50 text-indigo-700 font-semibold border border-indigo-100 transition">逻辑推理</button>
            <button onclick="loadTopic('Geometry')" class="px-5 py-2.5 bg-white rounded-full shadow-sm hover:shadow-md hover:bg-indigo-50 text-indigo-700 font-semibold border border-indigo-100 transition">几何图形</button>
            <button onclick="loadTopic('NumberTheory')" class="px-5 py-2.5 bg-white rounded-full shadow-sm hover:shadow-md hover:bg-indigo-50 text-indigo-700 font-semibold border border-indigo-100 transition">数论基础</button>
            <button onclick="loadTopic('WordProblems')" class="px-5 py-2.5 bg-white rounded-full shadow-sm hover:shadow-md hover:bg-indigo-50 text-indigo-700 font-semibold border border-indigo-100 transition">应用题</button>
            <button onclick="loadTopic('Combinatorics')" class="px-5 py-2.5 bg-white rounded-full shadow-sm hover:shadow-md hover:bg-indigo-50 text-indigo-700 font-semibold border border-indigo-100 transition">组合数学</button>
        </div>

        <div id="content" class="max-w-4xl mx-auto space-y-6">
            <div class="text-center py-20">
                <p class="text-xl text-gray-400 font-light">请点击上方按钮开始挑战题目</p>
            </div>
        </div>
    </main>

    <script>
        async function loadTopic(cat) {
            const grade = document.getElementById('gradeSelect').value;
            const content = document.getElementById('content');
            content.innerHTML = '<div class="text-center py-10 text-indigo-600">正在检索题库数据...</div>';
            
            try {
                const resp = await fetch(`/api/get-questions?grade=${grade}&category=${cat}`);
                const data = await resp.json();
                
                if (!data.length) {
                    content.innerHTML = '<div class="text-center py-10 text-gray-500">该专题正在整理中，敬请期待。</div>';
                    return;
                }

                content.innerHTML = data.map((item, i) => `
                    <div class="math-card bg-white p-8 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1.5 h-full bg-indigo-500"></div>
                        <div class="text-sm font-bold text-indigo-400 mb-2 tracking-widest uppercase">Question ${i+1}</div>
                        <div class="text-xl mb-6 leading-relaxed font-serif text-gray-900">${item.q}</div>
                        
                        <button onclick="this.nextElementSibling.classList.toggle('hidden')" 
                                class="inline-flex items-center text-sm font-bold text-indigo-600 hover:text-indigo-800 transition">
                            <span class="mr-1">查看解析与答案</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        
                        <div class="hidden mt-6 p-6 bg-indigo-50 rounded-xl border border-indigo-100 transition-all duration-500">
                            <div class="flex items-start gap-3">
                                <span class="bg-indigo-600 text-white text-xs px-2 py-1 rounded font-bold uppercase mt-1">Answer</span>
                                <div>
                                    <p class="text-indigo-900 font-bold text-lg">${item.a}</p>
                                    <p class="text-indigo-700/80 mt-2 text-sm leading-loose border-t border-indigo-200 pt-2 italic">
                                        解析：${item.exp}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');

                // 核心：调用 KaTeX 渲染页面中的 LaTeX 公式
                renderMathInElement(content, {
                    delimiters: [
                        {left: "$$", right: "$$", display: true},
                        {left: "$", right: "$", display: false}
                    ],
                    throwOnError: false
                });
            } catch (e) {
                content.innerHTML = '<div class="text-center py-10 text-red-500">数据加载异常，请检查网络连接。</div>';
            }
        }
    </script>
</body>
</html>
